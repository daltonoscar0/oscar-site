<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Oscar Dalton — native new yorker exploring language, computing, and their intersect."
    />
    <title>Oscar Dalton</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set theme before paint to avoid a flash of the wrong mode.
      (function () {
        var saved = localStorage.getItem("theme");
        var prefersDark =
          window.matchMedia &&
          window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme =
          saved || (prefersDark ? "dark" : "light");
      })();
    </script>
    <link rel="canonical" href="https://oscarpdalton.com/" />
    <meta property="og:title" content="Oscar Dalton" />
    <meta property="og:description" content="native new yorker exploring language, computing, and their intersect." />
    <meta property="og:url" content="https://oscarpdalton.com/" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
